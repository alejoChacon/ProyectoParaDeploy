upstream django_app {
    server web:8000; # El nombre del servicio en el compose
}

server {
    listen 80;
    server_name practica-docker.duckdns.org;

    
    location / {
        return 301 https://$host$request_uri;
    }
}

# 2. Configuración de Servidor Seguro (HTTPS)
server {
    listen 443 ssl;
    server_name practica-docker.duckdns.org;

    # Rutas a los certificados (estarán disponibles gracias al volumen en docker-compose)
    ssl_certificate /etc/letsencrypt/live/practica-docker.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/practica-docker.duckdns.org/privkey.pem;

    # Optimización SSL (Opcional pero recomendado)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Carpeta para archivos estáticos
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Carpeta para archivos subidos por usuarios
    location /media/ {
        alias /app/media/;
    }

    # Proxy hacia Django
    location / {
        proxy_pass http://django_app;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme; # Importante para que Django sepa que es HTTPS
        proxy_redirect off;
    }
}
